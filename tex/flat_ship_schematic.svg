<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#000" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0066cc" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" font-size="18" font-family="serif" text-anchor="middle" font-weight="bold">
    Flat Ship Model Schematic
  </text>
  
  <!-- Free surface (water plane) -->
  <line x1="50" y1="250" x2="750" y2="250" stroke="#2196F3" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="720" y="240" font-size="14" font-family="serif" fill="#2196F3">z = 0</text>
  
  <!-- Water region indicator -->
  <path d="M 60 260 Q 80 265, 100 260 T 140 260 T 180 260 T 220 260 T 260 260" 
        stroke="#87CEEB" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 60 280 Q 80 285, 100 280 T 140 280 T 180 280 T 220 280 T 260 280" 
        stroke="#87CEEB" stroke-width="1.5" fill="none" opacity="0.6"/>
  <text x="150" y="310" font-size="13" font-family="serif" fill="#555" font-style="italic">Water (z &lt; 0)</text>
  
  <!-- Planform (rectangular hull) - 3D perspective view -->
  <!-- Top surface of planform -->
  <path d="M 350 230 L 600 210 L 600 280 L 350 300 Z" 
        fill="#f0f0f0" stroke="#000" stroke-width="2.5"/>
  
  <!-- Leading edge (bow) -->
  <line x1="350" y1="230" x2="350" y2="300" stroke="#000" stroke-width="3"/>
  <text x="320" y="270" font-size="14" font-family="serif" font-weight="bold">Leading edge</text>
  
  <!-- Trailing edge (stern) -->
  <line x1="600" y1="210" x2="600" y2="280" stroke="#000" stroke-width="3"/>
  <text x="610" y="250" font-size="14" font-family="serif" font-weight="bold">Trailing edge</text>
  
  <!-- Dimension arrows and labels -->
  <!-- Length L -->
  <line x1="350" y1="320" x2="600" y2="302" stroke="#000" stroke-width="1.5" 
        marker-end="url(#arrowhead)" marker-start="url(#arrowhead)"/>
  <text x="470" y="340" font-size="16" font-family="serif" font-style="italic">L</text>
  
  <!-- Half-beam b -->
  <line x1="600" y1="245" x2="600" y2="210" stroke="#000" stroke-width="1.5" 
        marker-end="url(#arrowhead)" marker-start="url(#arrowhead)"/>
  <line x1="600" y1="245" x2="600" y2="280" stroke="#000" stroke-width="1.5" 
        marker-end="url(#arrowhead)" marker-start="url(#arrowhead)"/>
  <text x="640" y="225" font-size="16" font-family="serif" font-style="italic">b</text>
  <text x="640" y="270" font-size="16" font-family="serif" font-style="italic">b</text>
  
  <!-- Coordinate system axes -->
  <!-- x-axis (streamwise) -->
  <line x1="150" y1="450" x2="280" y2="450" stroke="#0066cc" stroke-width="2.5" 
        marker-end="url(#arrowhead-blue)"/>
  <text x="285" y="455" font-size="16" font-family="serif" font-weight="bold" fill="#0066cc">x</text>
  
  <!-- y-axis (spanwise) -->
  <line x1="150" y1="450" x2="150" y2="350" stroke="#0066cc" stroke-width="2.5" 
        marker-end="url(#arrowhead-blue)"/>
  <text x="155" y="340" font-size="16" font-family="serif" font-weight="bold" fill="#0066cc">y</text>
  
  <!-- z-axis (vertical) -->
  <line x1="150" y1="450" x2="100" y2="400" stroke="#0066cc" stroke-width="2.5" 
        marker-end="url(#arrowhead-blue)"/>
  <text x="85" y="395" font-size="16" font-family="serif" font-weight="bold" fill="#0066cc">z</text>
  
  <!-- Flow velocity vector -->
  <line x1="250" y1="150" x2="350" y2="150" stroke="#e91e63" stroke-width="3" 
        marker-end="url(#arrowhead)"/>
  <text x="290" y="140" font-size="16" font-family="serif" font-weight="bold" fill="#e91e63">U</text>
  
  <!-- Angle of attack -->
  <path d="M 350 230 L 380 230" stroke="#000" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 350 230 L 600 210" stroke="#666" stroke-width="1"/>
  <path d="M 380 230 A 30 30 0 0 0 390 222" stroke="#000" stroke-width="1.5" fill="none"/>
  <text x="395" y="230" font-size="14" font-family="serif" font-style="italic">α</text>
  
  <!-- Kelvin wedge indication -->
  <line x1="350" y1="265" x2="250" y2="180" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="350" y1="265" x2="250" y2="350" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="220" y="265" font-size="13" font-family="serif" fill="#FF9800">Kelvin wedge</text>
  
  <!-- Planform label -->
  <text x="450" y="260" font-size="14" font-family="serif" font-weight="bold">Planform 𝒞</text>
  
  <!-- Normal vector indication on planform -->
  <line x1="475" y1="245" x2="475" y2="210" stroke="#009688" stroke-width="2.5" 
        marker-end="url(#arrowhead-blue)"/>
  <text x="465" y="200" font-size="14" font-family="serif" fill="#009688" font-style="italic">n</text>
  
  <!-- Annotations -->
  <text x="50" y="580" font-size="12" font-family="serif" fill="#666">
    Downstream wake extends to x → −∞
  </text>
  
  <text x="400" y="420" font-size="12" font-family="serif" fill="#666" text-anchor="middle">
    (Rectangular planform at z = 0⁻, uniform downwash ∂ₙφ = α)
  </text>
</svg>